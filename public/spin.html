<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin - Real World</title>
    <link rel="stylesheet" href="spin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="phone-container">
        <div class="header-nav">
            <img src="./MABA 10th anniversary logo.png" alt="MABA Logo" class="top-logo">
            <a href="./profile.html" style="color: inherit;">
                <div class="profile-icon">
                    <i class="fa-solid fa-user"></i>
                </div>
            </a>
        </div>

        <h1 class="main-title">LUCKY SPIN</h1>

        <div class="wheel-wrapper">
            <div class="wheel-pointer"></div>

            <div class="outer-gold-ring">
                <div class="dot" style="--i:1;"></div>
                <div class="dot" style="--i:2;"></div>
                <div class="dot" style="--i:3;"></div>
                <div class="dot" style="--i:4;"></div>
                <div class="dot" style="--i:5;"></div>
                <div class="dot" style="--i:6;"></div>
                <div class="dot" style="--i:7;"></div>
                <div class="dot" style="--i:8;"></div>
                <div class="dot" style="--i:9;"></div>
                <div class="dot" style="--i:10;"></div>
                <div class="dot" style="--i:11;"></div>
                <div class="dot" style="--i:12;"></div>
                <div class="dot" style="--i:13;"></div>
                <div class="dot" style="--i:14;"></div>
                <div class="dot" style="--i:15;"></div>
                <div class="dot" style="--i:16;"></div>
                <div class="dot" style="--i:17;"></div>
                <div class="dot" style="--i:18;"></div>
                <div class="dot" style="--i:19;"></div>
                <div class="dot" style="--i:20;"></div>

                <div class="spin-wheel" id="wheel">
                    <div class="inner-center-pin"></div>

                    <div class="number-tag red-sector" data-id="1" style="--i:1;">
                        <div class="prize-content">💎 Diamond</div>
                    </div>
                    <div class="number-tag" data-id="2" style="--i:2;">
                        <div class="prize-content">🥇 Gold 1</div>
                    </div>
                    <div class="number-tag red-sector" data-id="3" style="--i:3;">
                        <div class="prize-content">🥇 Gold 2</div>
                    </div>

                    <div class="number-tag" data-id="4" style="--i:4;">
                        <div class="prize-content">🥈 Silver 1</div>
                    </div>
                    <div class="number-tag red-sector" data-id="5" style="--i:5;">
                        <div class="prize-content">🥈 Silver 2</div>
                    </div>
                    <div class="number-tag" data-id="6" style="--i:6;">
                        <div class="prize-content">🥈 Silver 3</div>
                    </div>

                    <div class="number-tag red-sector" data-id="7" style="--i:7;">
                        <div class="prize-content">🥉 Bronze 1</div>
                    </div>
                    <div class="number-tag" data-id="8" style="--i:8;">
                        <div class="prize-content">🥉 Bronze 2</div>
                    </div>
                    <div class="number-tag red-sector" data-id="9" style="--i:9;">
                        <div class="prize-content">🥉 Bronze 3</div>
                    </div>
                    <div class="number-tag" data-id="10" style="--i:10;">
                        <div class="prize-content">🥉 Bronze 4</div>
                    </div>
                    <div class="number-tag red-sector" data-id="11" style="--i:11;">
                        <div class="prize-content">🥉 Bronze 5</div>
                    </div>

                    <div class="number-tag" data-id="12" style="--i:12;">
                        <div class="prize-content">🎁 Gift 1</div>
                    </div>
                    <div class="number-tag red-sector" data-id="13" style="--i:13;">
                        <div class="prize-content">🎁 Gift 2</div>
                    </div>
                    <div class="number-tag" data-id="14" style="--i:14;">
                        <div class="prize-content">🎁 Gift 3</div>
                    </div>
                    <div class="number-tag red-sector" data-id="15" style="--i:15;">
                        <div class="prize-content">🎁 Gift 4</div>
                    </div>
                    <div class="number-tag" data-id="16" style="--i:16;">
                        <div class="prize-content">🎁 Gift 5</div>
                    </div>
                    <div class="number-tag red-sector" data-id="17" style="--i:17;">
                        <div class="prize-content">🎁 Gift 6</div>
                    </div>
                    <div class="number-tag" data-id="18" style="--i:18;">
                        <div class="prize-content">🎁 Gift 7</div>
                    </div>
                    <div class="number-tag red-sector" data-id="19" style="--i:19;">
                        <div class="prize-content">🎁 Gift 8</div>
                    </div>
                    <div class="number-tag" data-id="20" style="--i:20;">
                        <div class="prize-content">🎁 Gift 9</div>
                    </div>
                </div>
            </div>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="startSpin()">SPIN</button>

        <footer class="footer">
            <a href="./reg.html">
                <div class="bottom-btn home-btn">
                    <i class="fa-solid fa-house"></i>
                </div>
            </a>
            <a href="./rank.html">
                <button class="nav-btn-circle rank-btn" onclick="window.location.href='rank.html'">
                    <div class="btn-icon-wrap"><i class="fa-solid fa-trophy"></i></div>
                </button>
            </a>
        </footer>

        <div id="prizePopup" class="popup-overlay">
            <div class="popup-content">
                <div class="popup-icon">🎉</div>
                <h2>ကံထူးမှုအောင်မြင်ပါသည်</h2>
                <p>သင်ရရှိသော ကံထူးဆုမှာ</p>
                <div id="popupPrizeName" class="prize-badge">--</div>
                <button class="popup-close-btn" onclick="closePopup()">OK</button>
            </div>
        </div>

        <div class="footer-text">
            © Metro IT (Knowledge Key)
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="spin-script.js"></script>
</body>

</html>
